<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>小红书巡游日志</title>
<link rel="stylesheet" href="/static/common.css">
<style>
body.sub-page {
  display:block;
  max-width:none;
  min-height:100dvh;
  height:auto;
  overflow:auto;
  background:var(--bg);
}
.wrap {
  width:min(1040px, 100%);
  margin:0 auto;
  padding:18px 14px 34px;
}
.panel {
  border:1px solid var(--line, var(--border, #f0e4dd));
  border-radius:22px;
  background:rgba(255,255,255,.76);
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 14px 36px rgba(140,72,49,.10);
}
.section-head,
.log-top {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}
.eyebrow {
  margin:0 0 4px;
  color:#ff6b7f;
  font-size:12px;
  font-weight:800;
  letter-spacing:.08em;
}
h1,
h2 {
  margin:0;
  color:var(--text);
}
h1 {
  font-size:25px;
}
h2 {
  font-size:17px;
}
.hint {
  color:var(--text3);
  font-size:12px;
  line-height:1.6;
}
.row {
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.sticky-actions {
  position:sticky;
  top:8px;
  z-index:20;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  width:max-content;
  max-width:100%;
  margin:-4px 0 14px;
  padding:7px;
  border:1px solid var(--line, var(--border, #f0e4dd));
  border-radius:999px;
  background:rgba(255,255,255,.86);
  box-shadow:0 10px 26px rgba(140,72,49,.12);
  backdrop-filter:blur(12px) saturate(1.15);
  -webkit-backdrop-filter:blur(12px) saturate(1.15);
}
button {
  border:0;
  border-radius:999px;
  background:linear-gradient(135deg, #ff6b7f, #ff9860);
  color:white;
  padding:9px 14px;
  font-weight:800;
  cursor:pointer;
}
button.secondary {
  background:rgba(125,125,125,.13);
  color:var(--text);
}
button.ghost {
  background:transparent;
  color:var(--text2);
  border:1px solid var(--line, var(--border, #f0e4dd));
}
button.small {
  padding:7px 11px;
  font-size:12px;
}
.log-list {
  display:grid;
  gap:10px;
  margin-top:12px;
}
.log-item {
  border:1px solid var(--line, var(--border, #f0e4dd));
  border-radius:18px;
  background:rgba(255,255,255,.66);
  padding:13px;
}
.log-item.errorish {
  border-color:rgba(207,34,46,.18);
}
.log-title {
  min-width:0;
  font-weight:900;
  color:var(--text);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.log-main {
  display:grid;
  gap:6px;
  color:var(--text2);
  font-size:13px;
  line-height:1.5;
  margin-top:9px;
}
.log-line {
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.log-comment {
  padding:9px 10px;
  border-radius:14px;
  background:rgba(255,107,127,.08);
  color:var(--text);
  word-break:break-word;
}
.pill {
  display:inline-flex;
  align-items:center;
  max-width:100%;
  padding:3px 9px;
  border-radius:999px;
  background:rgba(125,125,125,.12);
  color:var(--text2);
  font-size:12px;
  line-height:1.35;
}
.pill.ok {
  background:rgba(36,138,82,.12);
  color:#248a52;
}
.pill.warn {
  background:rgba(184,107,0,.12);
  color:#a15e00;
}
.pill.error {
  background:rgba(207,34,46,.10);
  color:var(--danger, #cf222e);
}
.mini-note {
  padding:9px 10px;
  border-radius:14px;
  background:rgba(255,107,127,.10);
  color:var(--text2);
  font-size:12px;
  line-height:1.5;
  margin-top:8px;
}
.log-extra {
  margin-top:10px;
}
.log-extra summary {
  cursor:pointer;
  color:var(--text2);
  font-size:12px;
  font-weight:800;
}
pre {
  max-height:300px;
  overflow:auto;
  padding:11px;
  margin:8px 0 0;
  border:1px solid var(--line, var(--border, #f0e4dd));
  border-radius:14px;
  background:rgba(80,58,48,.06);
  color:var(--text2);
  font-size:12px;
  line-height:1.45;
  white-space:pre-wrap;
  word-break:break-word;
}
.empty-state {
  border:1px dashed var(--line, var(--border, #f0e4dd));
  border-radius:18px;
  padding:20px;
  text-align:center;
  color:var(--text3);
  background:rgba(255,255,255,.42);
}
@media (max-width:720px) {
  .wrap { padding:12px 10px 28px; }
  .sticky-actions {
    top:6px;
    width:100%;
    border-radius:18px;
  }
  .section-head,
  .log-top {
    flex-direction:column;
    align-items:stretch;
  }
}
</style>
</head>
<body class="sub-page">
<div class="wrap">
  <section class="panel">
    <div class="section-head">
      <div>
        <p class="eyebrow">XHS LITE</p>
        <h1>小红书巡游日志</h1>
        <div class="hint" id="logsHint">正在读取最近记录...</div>
      </div>
    </div>
  </section>

  <div class="sticky-actions">
    <button class="secondary small" type="button" onclick="loadLogs()">刷新</button>
    <button class="ghost small" type="button" onclick="location.href='/xhs-lite'">返回工作台</button>
  </div>

  <section class="panel">
    <div class="section-head">
      <h2>最近记录</h2>
      <button class="ghost small" id="moreLogsBtn" type="button" onclick="loadMoreLogs()">加载更多</button>
    </div>
    <div id="logsBox" class="log-list"></div>
  </section>
</div>

<script>
const $ = id => document.getElementById(id);
let currentLogLimit = 20;

async function api(method, url) {
  const res = await fetch(url, { method });
  const text = await res.text();
  try {
    return text ? JSON.parse(text) : {};
  } catch (err) {
    return { ok:false, error:'接口返回无法解析：' + text.slice(0, 200) };
  }
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}
function brief(s, max = 170) {
  const text = String(s == null ? '' : s).replace(/\s+/g, ' ').trim();
  return text.length > max ? text.slice(0, max - 1) + '…' : text;
}
function pill(text, cls = '') {
  return text ? '<span class="pill ' + cls + '">' + esc(text) + '</span>' : '';
}
function statusName(status) {
  return {
    observed:'只观察',
    drafted:'已生成草稿',
    commented:'已评论',
    replied:'已回复'
  }[status] || (status || '完成');
}
function statusTone(status, ok = true) {
  if (!ok) return 'error';
  if (status === 'drafted' || status === 'observed') return 'warn';
  if (status === 'commented' || status === 'replied') return 'ok';
  return 'ok';
}
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return (d.getMonth()+1) + '/' + d.getDate() + ' '
    + String(d.getHours()).padStart(2,'0') + ':'
    + String(d.getMinutes()).padStart(2,'0');
}
function renderLogItem(item) {
  const target = item.target || {};
  const note = item.note || {};
  const decision = item.decision || {};
  const status = item.status || '';
  const tone = statusTone(status, !item.error || status === 'drafted');
  const title = (item.actor_name || item.actor || '角色') + '：' + statusName(status);
  const targetText = target.nickname || target.user_id || '未记录目标';
  const noteText = note.title || note.note_id || '未记录帖子';
  const commentText = item.comment_text || (status === 'observed' ? '本次只观察，没有评论。' : '（无评论内容）');
  const reasonText = decision.reason || item.error || '';
  const raw = esc(JSON.stringify(item, null, 2));
  return '<article class="log-item ' + (tone === 'error' ? 'errorish' : '') + '">'
    + '<div class="log-top">'
    + '<div class="log-title">' + esc(title) + '</div>'
    + '<div class="row">' + pill(fmtTime(item.created_at)) + pill(statusName(status), tone) + '</div>'
    + '</div>'
    + '<div class="log-main">'
    + '<div class="log-line">目标：' + esc(targetText) + '</div>'
    + '<div class="log-line">帖子：' + esc(noteText) + '</div>'
    + '<div class="log-comment">' + esc(brief(commentText)) + '</div>'
    + (reasonText ? '<div class="hint">理由：' + esc(brief(reasonText, 120)) + '</div>' : '')
    + '</div>'
    + '<details class="log-extra">'
    + '<summary>展开理由和完整记录</summary>'
    + (reasonText ? '<div class="mini-note">完整理由：' + esc(reasonText) + '</div>' : '')
    + '<pre>' + raw + '</pre>'
    + '</details>'
    + '</article>';
}
async function loadLogs() {
  $('logsHint').textContent = '正在读取最近记录...';
  const data = await api('GET', '/api/xhs-lite/logs?limit=' + currentLogLimit);
  const items = Array.isArray(data.items) ? data.items : [];
  $('logsHint').textContent = items.length
    ? '正在显示最近 ' + items.length + ' 条记录。'
    : '还没有日志，手动跑一次后会出现在这里。';
  $('logsBox').innerHTML = items.length
    ? items.map(renderLogItem).join('')
    : '<div class="empty-state">暂无日志</div>';
  $('moreLogsBtn').disabled = currentLogLimit >= 100;
}
function loadMoreLogs() {
  currentLogLimit = Math.min(100, currentLogLimit + 20);
  loadLogs();
}
loadLogs().catch(err => {
  $('logsHint').textContent = '加载失败：' + (err.message || String(err));
});
</script>
</body>
</html>
