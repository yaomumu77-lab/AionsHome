<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Aion Chat</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/public/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/public/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ff8359">
<link rel="stylesheet" href="/static/chat.css?v=date-summary-card-20260628">
</head>
<body data-theme="dark">

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button onclick="newConversation()">+ 新对话</button>
      <button class="settings-btn" onclick="openFileManager()">📁</button>
      <button class="settings-btn" onclick="openSubPage('/settings')">⚙</button>
    </div>
    <div class="conv-list" id="convList"></div>
    <div class="sidebar-footer">
      <button id="sysLogBtn" onclick="openSystemLog()">📋 系统日志</button>
      <button onclick="openWhisper()">💗 密语时刻</button>
      <button onclick="openStarredPanel()">⭐ 星标消息</button>
      <button onclick="openWalletPanel()">💰 钱包</button>
      <button onclick="openSubPage('/diary')">📔 日记本</button>
      <button onclick="openSubPage('/')">🏠 返回主页</button>
    </div>
  </aside>
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>



  <div class="modal-overlay" id="fileModal">
    <div class="modal fm-modal">
      <div id="fmList">
        <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:6px">
          <h3 style="margin:0">📁 聊天记录文件</h3>
          <button class="btn-cancel" onclick="closeFileManager()" style="padding:6px 16px;font-size:13px">✕ 关闭</button>
        </div>
        <div class="fm-file-list" id="fmFileList"></div>
      </div>
      <div id="fmEditor" style="display:none">
        <h3 id="fmEditorTitle">编辑文件</h3>
        <textarea class="fm-textarea" id="fmContent"></textarea>
        <div class="btn-row">
          <button class="btn-cancel" onclick="fmBack()">返回</button>
          <button class="btn-save" onclick="fmSave()">保存并同步</button>
        </div>
      </div>
    </div>
  </div>



  <!-- 密语时刻面板 -->
  <div class="modal-overlay" id="whisperModal">
    <div class="modal whisper-modal">
      <h3>💗 密语时刻</h3>
      <!-- BLE 连接 -->
      <div class="whisper-conn-bar">
        <div class="whisper-conn-left">
          <div class="whisper-dot off" id="toyDot"></div>
          <span class="whisper-conn-label" id="toyConnLabel">未连接</span>
        </div>
        <button class="whisper-btn-conn" id="toyConnBtn" onclick="toyToggleConnect()">连接</button>
      </div>
      <!-- 密语模式开关 -->
      <div class="whisper-toggle-row">
        <span class="whisper-toggle-label">🔮 密语模式（开启后AI可控制玩具）</span>
        <label class="toggle-switch">
          <input type="checkbox" id="whisperModeToggle" onchange="onWhisperModeChange()">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <!-- 预设网格 -->
      <div class="whisper-preset-grid" id="toyPresetGrid"></div>
      <div class="whisper-stop-row">
        <button class="whisper-btn-stop" onclick="toyStopAll()">⏹ 停止</button>
      </div>
      <!-- 日志 -->
      <div class="whisper-log">
        <div class="whisper-log-area" id="toyLogArea"></div>
      </div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn-cancel" onclick="closeWhisper()">关闭</button>
      </div>
    </div>
  </div>

  <!-- 预设编辑器弹窗 -->
  <div class="toy-overlay" id="toyEditorOverlay" onclick="if(event.target===this)toyCloseEditor()">
    <div class="toy-edit-sheet">
      <div class="toy-sheet-handle"></div>
      <div id="toyEditContent"></div>
    </div>
  </div>



  <div class="modal-overlay" id="starredModal">
    <div class="modal starred-modal">
      <h3>⭐ 星标消息</h3>
      <div class="starred-list" id="starredList">
        <div class="starred-empty">暂无星标消息</div>
      </div>
      <div class="btn-row">
        <button class="btn-cancel" onclick="closeStarredPanel()">关闭</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="sysLogModal">
    <div class="modal syslog-modal">
      <h3>📋 系统日志</h3>
      <div class="syslog-count" id="sysLogCount">共 0 条（刷新后清空）</div>
      <div class="syslog-list" id="sysLogList">
        <div class="syslog-empty">暂无日志</div>
      </div>
      <div class="btn-row">
        <button class="btn-cancel" onclick="copyAllSystemLogs()">复制全部</button>
        <button class="btn-cancel" onclick="clearSystemLog()">清空</button>
        <button class="btn-cancel" onclick="closeSystemLog()">关闭</button>
      </div>
    </div>
  </div>









  <div class="alarm-overlay" id="alarmOverlay">
    <div class="alarm-box">
      <div class="alarm-icon">⏰</div>
      <h3>日程提醒</h3>
      <div class="alarm-content" id="alarmContent"></div>
      <div class="alarm-time" id="alarmTime"></div>
      <button onclick="dismissAlarm()">确认</button>
    </div>
  </div>

  <main class="chat-area">
    <div class="chat-header">
      <button class="home-btn" onclick="openSubPage('/')" title="返回主页">⬅</button>
      <button class="menu-btn" onclick="openSidebar()">☰</button>
      <div class="title" id="chatTitle" onclick="renameCurrent()">Aion Chat</div>
      <div class="tts-toggle" title="自动语音播放">
        <span class="tts-label">🔊</span>
        <label class="toggle-switch">
          <input type="checkbox" id="ttsToggle" onchange="toggleTTS()">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <button class="config-btn" onclick="toggleConfig(event)">&#9881;</button>
    </div>
    <div class="config-popup" id="configPopup">
      <label>模型</label>
      <select id="modelSelect" onchange="changeModel()"></select>
      <label>上下文数量</label>
      <div class="slider-row">
        <input type="range" id="contextSlider" min="1" max="100" value="30" oninput="document.getElementById('contextValue').textContent=this.value+'条'; localStorage.setItem('aion_context_limit', this.value)">
        <span class="slider-val" id="contextValue">30条</span>
      </div>
      <label>模型温度</label>
      <div class="slider-row">
        <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="1" oninput="document.getElementById('tempValue').textContent=this.value; localStorage.setItem('aion_temperature', this.value); syncTemperature()">
        <span class="slider-val" id="tempValue">1</span>
      </div>
      <label>最大回复长度</label>
      <div class="slider-row">
        <input type="range" id="maxTokensSlider" min="0" max="16384" step="256" value="0" oninput="const v=parseInt(this.value); document.getElementById('maxTokensValue').textContent=v===0?'不限':v; localStorage.setItem('aion_max_tokens', this.value)">
        <span class="slider-val" id="maxTokensValue">不限</span>
      </div>
      <div class="cam-section">
        <div class="cam-section-title">◈ 语音合成 (TTS)</div>
        <div class="tts-voice-row">
          <label>音色</label>
          <select id="ttsVoiceSelect" onchange="changeTTSVoice()"><option value="">加载中...</option></select>
          <button onclick="refreshTTSVoices()" style="background:none;border:none;cursor:pointer;font-size:14px" title="刷新音色列表">🔄</button>
        </div>
      </div>
      <div class="cam-section">
        <div class="cam-toggle-row">
          <span class="cam-toggle-label">语音监听 <span id="voiceStatus" style="font-size:11px;color:var(--text3);margin-left:6px">未开启</span></span>
          <label class="toggle-switch">
            <input type="checkbox" id="voiceToggle" onchange="toggleVoice()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="cam-config-row">
          <label>麦克风</label>
          <select id="voiceMicSource" style="flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;outline:none" onchange="onMicSourceChange()">
            <option value="local">🖥 本机 (PC后端)</option>
            <option value="remote">📱 手机麦克风</option>
          </select>
        </div>
        <div class="cam-config-row">
          <label>唤醒词</label>
          <input type="text" id="voiceWakeWord" value="老公" style="flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;outline:none" onchange="updateVoiceWakeWord()">
        </div>
      </div>
      <div class="cam-section">
        <div class="cam-toggle-row">
          <span class="cam-toggle-label">允许 AI 发起视频通话</span>
          <label class="toggle-switch">
            <input type="checkbox" id="videoCallToggle" onchange="toggleVideoCallEnabled()">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="cam-section">
        <div class="cam-toggle-row">
          <span class="cam-toggle-label">允许 AI 生成图片</span>
          <label class="toggle-switch">
            <input type="checkbox" id="imageGenToggle" onchange="toggleImageGenEnabled()">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="cam-section">
        <div class="cam-toggle-row">
          <span class="cam-toggle-label">允许 AI 生成歌曲</span>
          <label class="toggle-switch">
            <input type="checkbox" id="songGenToggle" onchange="toggleSongGenEnabled()">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="cam-section">
        <div class="cam-toggle-row">
          <span class="cam-toggle-label">允许 CLI 模型调用工具</span>
          <label class="toggle-switch">
            <input type="checkbox" id="geminiCliToolsToggle" onchange="toggleGeminiCliTools()">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>
    <div class="context-bar" style="display:none">
      <span class="context-label">上下文:</span>
      <input type="range" min="1" max="100" value="20">
      <span>20 条</span>
    </div>
    <div class="voice-indicator" id="voiceIndicator">
      <span class="voice-pulse"></span>
      <span id="voiceIndicatorText">语音监听中...</span>
      <button onclick="voiceHangup()" id="voiceHangupBtn" style="display:none;margin-left:auto;background:none;border:1px solid currentColor;color:inherit;border-radius:12px;padding:2px 10px;font-size:11px;cursor:pointer">挂断</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="preview-area" id="previewArea"></div>
      <div class="input-row" id="inputRow">
        <div class="plus-menu-wrap">
          <button class="upload-btn" onclick="togglePlusMenu()" title="更多功能">＋</button>
          <div class="plus-menu" id="plusMenu">
            <div class="plus-menu-item" onclick="closePlusMenu();$('fileInput').click()"><span class="pm-icon">📎</span>上传文件</div>
            <div class="plus-menu-item" onclick="closePlusMenu();openCamera()"><span class="pm-icon">📷</span>拍照</div>
            <div class="plus-menu-item" onclick="closePlusMenu();if(typeof videoCall!=='undefined')videoCall.userInitiate()"><span class="pm-icon">📹</span>视频通话</div>
            <div class="plus-menu-item" onclick="closePlusMenu();toggleVoiceMode()"><span class="pm-icon">🎤</span>语音消息</div>            <div class="plus-menu-item" onclick="closePlusMenu();openTransferDialog()"><span class="pm-icon">💰</span>转账</div>          </div>
        </div>
        <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display:none" onchange="handleFileSelect(this)">
        <textarea id="input" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)" oninput="autoResize(this); _updateSendBtnState()"></textarea>
        <button class="send-btn" id="sendBtn" onclick="handleSendBtn()" disabled>➤</button>
      </div>
      <div class="voice-mode-row" id="voiceModeRow">
        <button class="voice-kbd-btn" onclick="toggleVoiceMode()" title="切换键盘">⌨</button>
        <div class="voice-hold-btn" id="voiceHoldBtn">按住 说话</div>
      </div>
    </div>
    <div class="bottom-fade-overlay"></div>
  </main>
</div>

<!-- ── 子页面 iframe 浮层（保持聊天页存活，SSE/TTS 不中断） ── -->
<div id="subPageOverlay">
  <div id="subPageBar">
    <button onclick="closeSubPage()">✕</button>
    <span id="subPageTitle"></span>
  </div>

  <div id="subPageFrames">
    <iframe id="subPageFrame" class="sub-page-frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals" allow="autoplay"></iframe>
  </div>
</div>
<script src="/static/chat.js?v=date-summary-card-20260628"></script>

<!-- ── 转账弹窗 ── -->
<div class="transfer-dialog-overlay" id="transferDialogOverlay" onclick="closeTransferDialog()">
  <div class="transfer-dialog" onclick="event.stopPropagation()">
    <div class="transfer-dialog-title" id="transferDialogTitle">转账</div>
    <input type="number" id="transferAmountInput" class="transfer-amount-input" placeholder="输入金额" step="1">
    <div class="transfer-dialog-hint">正数=转账，负数=扣除</div>
    <div class="transfer-dialog-btns">
      <button class="transfer-btn-cancel" onclick="closeTransferDialog()">取消</button>
      <button class="transfer-btn-confirm" onclick="confirmTransfer()">确认</button>
    </div>
  </div>
</div>

<!-- ── 钱包悬浮面板 ── -->
<div class="wallet-panel-overlay" id="walletPanelOverlay" onclick="closeWalletPanel()">
  <div class="wallet-panel" onclick="event.stopPropagation()">
    <div class="wallet-panel-header">
      <span>💰 钱包</span>
      <button class="wallet-close-btn" onclick="closeWalletPanel()">✕</button>
    </div>
    <div class="wallet-balance-section">
      <div class="wallet-balance-label">当前余额</div>
      <div class="wallet-balance-value" id="walletBalanceValue">¥0.00</div>
    </div>
    <div class="wallet-tx-header">转账记录</div>
    <div class="wallet-tx-list" id="walletTxList"></div>
  </div>
</div>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
<script src="/static/video-call.js"></script>
</body>
</html>
