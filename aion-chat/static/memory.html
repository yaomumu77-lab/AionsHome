<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>记忆库</title>
<link rel="stylesheet" href="/static/common.css">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff8359">
<style>
.sub-page { overflow:hidden; }
.page-content { display:flex; flex-direction:column; min-height:0; overflow:hidden; padding-bottom:calc(18px + env(safe-area-inset-bottom)); }
.mem-search { width:100%; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:8px 10px; font-size:13px; outline:none; margin-bottom:8px; box-sizing:border-box; }
.mem-tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:8px; }
.mem-tab { border:1px solid var(--border); background:var(--surface2); color:var(--text2); border-radius:6px; padding:6px 8px; font-size:12px; cursor:pointer; font-weight:600; }
.mem-tab.active { border-color:var(--accent); background:rgba(126,87,194,0.16); color:var(--accent); }
.mem-list { flex:1; min-height:0; overflow-y:auto; max-height:none; border:1px solid var(--border); border-radius:8px; background:var(--bg); padding:4px; }
.mem-entry { padding:8px 10px; border-bottom:1px solid var(--border); font-size:13px; line-height:1.5; display:flex; align-items:flex-start; gap:8px; }
.mem-entry:last-child { border-bottom:none; }
.mem-entry.mem-return-focus { background:rgba(74,144,226,0.12); }
.mem-type { font-size:10px; padding:2px 6px; border-radius:4px; background:var(--surface2); color:var(--accent); white-space:nowrap; flex-shrink:0; margin-top:2px; }
.mem-type.kind-daily { color:#2e7d32; }
.mem-type.kind-long-term { color:#c45a24; }
.mem-left { display:flex; flex-direction:column; align-items:center; gap:3px; flex-shrink:0; margin-top:2px; }
.mem-imp { font-size:10px; color:var(--text3); font-weight:600; }
.mem-meta { display:flex; align-items:center; gap:6px; margin-top:3px; flex-wrap:wrap; }
.mem-kw { font-size:10px; color:var(--accent); opacity:0.85; }
.mem-time { font-size:10px; color:var(--text3); }
.mem-content { flex:1; color:var(--text); word-break:break-word; }
.mem-content-edit { flex:1; background:var(--surface2); color:var(--text); border:1px solid var(--accent); border-radius:4px; padding:8px 10px; font-size:14px; font-family:inherit; resize:vertical; min-height:50vh; line-height:1.5; width:100%; box-sizing:border-box; }
.mem-actions { display:flex; gap:4px; flex-shrink:0; margin-top:2px; }
.mem-actions button { background:none; border:none; cursor:pointer; font-size:14px; padding:2px; opacity:0.6; }
.mem-actions button:hover { opacity:1; }
.mem-pin { transition: opacity 0.15s; }
.mem-pin.active { opacity:1 !important; }
.mem-entry.mem-unresolved { background:rgba(255,152,0,0.08); border-left:2px solid #ff9800; }
.mem-empty { padding:24px; text-align:center; color:var(--text3); font-size:14px; }
.mem-add-row { display:flex; gap:6px; margin-top:8px; }
.mem-add-row input { flex:1; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px 10px; font-size:13px; outline:none; }
.mem-add-row select { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px 8px; font-size:12px; outline:none; }
.mem-add-row button { background:var(--accent); color:#fff; border:none; border-radius:6px; padding:6px 14px; font-size:13px; cursor:pointer; font-weight:600; white-space:nowrap; }
.mem-count { font-size:11px; color:var(--text3); margin-bottom:4px; }
.btn-digest { background:#2e7d32; color:#fff; border:none; border-radius:6px; padding:6px 14px; font-size:13px; cursor:pointer; font-weight:600; white-space:nowrap; }
.btn-digest:hover { background:#388e3c; }
.btn-digest:disabled { background:var(--surface2); color:var(--text3); cursor:not-allowed; }
.memory-actions-row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:6px; margin-top:8px; flex-shrink:0; }
.memory-actions-row .btn-digest { min-width:0; width:100%; padding:7px 5px; white-space:normal; line-height:1.25; }
.digest-status { margin-top:8px; padding:8px 12px; border-radius:6px; font-size:12px; line-height:1.5; }
.digest-status.success { background:#e8f5e9; color:#2e7d32; }
.digest-status.info { background:#e3f2fd; color:#1565c0; }
.digest-status.error { background:#fce4ec; color:#c62828; }
.compress-review { margin-top:8px; max-height:40vh; overflow-y:auto; flex-shrink:0; border:1px solid var(--border); border-radius:8px; background:var(--surface); padding:10px; font-size:12px; line-height:1.45; }
.compress-review-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:6px; }
.compress-review-title { font-weight:700; color:var(--text); }
.compress-review-status { color:var(--text3); font-size:11px; }
.compress-review-stats { display:flex; gap:6px; flex-wrap:wrap; margin:6px 0; }
.compress-review-stats span { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:2px 6px; color:var(--text2); }
.compress-review-msg { color:var(--text2); white-space:pre-wrap; margin:6px 0; }
.compress-review details { border-top:1px solid var(--border); padding-top:6px; margin-top:6px; }
.compress-review summary { cursor:pointer; color:var(--accent); font-weight:600; }
.compress-item { padding:6px 0; border-bottom:1px solid var(--border); }
.compress-item:last-child { border-bottom:none; }
.compress-item-meta { display:flex; gap:6px; flex-wrap:wrap; color:var(--text3); font-size:10px; margin-top:3px; }
.compress-item-reason { color:var(--text3); font-size:11px; margin-top:3px; }
.compress-edit { display:grid; gap:6px; margin-top:6px; }
.compress-edit textarea,
.compress-edit input,
.compress-edit select { width:100%; box-sizing:border-box; border:1px solid var(--border); border-radius:5px; background:var(--surface2); color:var(--text); padding:5px 7px; font-size:12px; }
.compress-edit textarea { min-height:58px; resize:vertical; }
.compress-edit-row { display:grid; grid-template-columns:1fr 90px 90px; gap:6px; }
.compress-mini-actions { display:flex; gap:6px; justify-content:flex-end; margin-top:4px; }
.compress-mini-actions button { border:1px solid var(--border); background:var(--surface2); color:var(--text2); border-radius:5px; padding:3px 8px; font-size:11px; cursor:pointer; }
.compress-old-toggle { display:flex; gap:8px; align-items:flex-start; }
.compress-old-toggle input { margin-top:3px; }
.compress-review-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:10px; }
.compress-review-actions button { border:none; border-radius:5px; padding:5px 12px; font-size:12px; cursor:pointer; font-weight:600; }
.compress-discard-btn { background:var(--surface2); color:var(--text2); border:1px solid var(--border) !important; }
.compress-apply-btn { background:#2e7d32; color:#fff; }
.compress-review-actions button:disabled { opacity:0.55; cursor:not-allowed; }
.mem-source-btn { background:none; border:none; cursor:pointer; font-size:12px; padding:2px; opacity:0.6; color:var(--accent); }
.mem-source-btn:hover { opacity:1; }
.anchor-row { display:flex; align-items:center; gap:8px; margin-top:8px; padding:6px 0; border-top:1px solid var(--border); font-size:12px; }
.anchor-label { color:var(--text2); white-space:nowrap; }
.anchor-label span { color:var(--accent); }
.anchor-input { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:3px 6px; font-size:12px; outline:none; }
.anchor-reset-btn { background:#e65100; color:#fff; border:none; border-radius:4px; padding:3px 10px; font-size:12px; cursor:pointer; white-space:nowrap; }
/* 原文弹窗 */
.source-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:20; align-items:center; justify-content:center; }
.source-overlay.show { display:flex; }
.source-modal { background:var(--surface); border-radius:12px; width:90%; max-width:500px; padding:20px; max-height:80vh; overflow-y:auto; }
.source-msg { padding:8px 10px; border-bottom:1px solid var(--border); font-size:13px; line-height:1.5; }
.source-msg:last-child { border-bottom:none; }
.source-msg.source-off { opacity:0.42; }
.source-head { display:flex; align-items:flex-start; gap:8px; }
.source-check { margin-top:2px; width:18px; height:18px; flex-shrink:0; accent-color:var(--accent); }
.source-main { flex:1; min-width:0; }
.source-toolbar { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0 10px; }
.source-toolbar button { background:var(--surface2); color:var(--text2); border:1px solid var(--border); border-radius:5px; padding:4px 10px; font-size:12px; cursor:pointer; }
.source-toolbar .source-save { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
.source-summary { color:var(--text3); font-size:12px; line-height:1.4; margin-bottom:6px; }
.source-name { font-weight:600; color:var(--accent); margin-right:6px; font-size:12px; }
.source-time { font-size:10px; color:var(--text3); }
@media (max-width: 768px) {
  .mem-entry { flex-direction:column; gap:4px; padding:10px 8px; position:relative; }
  .mem-left { flex-direction:row; gap:6px; }
  .mem-actions { position:absolute; top:8px; right:6px; }
  .mem-add-row { flex-wrap:wrap; }
  .mem-add-row input { flex-basis:100%; }
  .mem-add-row select { flex:1; }
  .anchor-row { flex-wrap:nowrap; gap:6px; overflow-x:auto; }
  .page-content { padding:10px 12px calc(20px + env(safe-area-inset-bottom)); }
  .memory-actions-row { margin-inline:4px; }
  .memory-actions-row .btn-digest { font-size:12px; }
}
/* 聚焦编辑模式 */
.editing-focus .mem-search,
.editing-focus .mem-tabs,
.editing-focus .mem-count,
.editing-focus .mem-add-row,
.editing-focus .anchor-row,
.editing-focus .digest-status,
.editing-focus .compress-review,
.editing-focus .btn-row,
.editing-focus .top-bar { display:none !important; }
.editing-focus .mem-list { max-height:none; border:none; overflow:visible; }
.editing-focus .mem-entry:not(.mem-editing) { display:none !important; }
.editing-focus .mem-entry.mem-editing { border:none; }
.editing-focus .page-content { padding-top:12px; }
</style>
</head>
<body>
<div class="sub-page">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='/'">⬅</button>
    <h2>🧠 记忆库</h2>
  </div>
  <div class="page-content">
    <input class="mem-search" id="memSearch" type="text" placeholder="🔍 搜索记忆..." oninput="filterMemories()">
    <div class="mem-tabs" role="tablist" aria-label="记忆分类">
      <button class="mem-tab active" data-kind="all" onclick="setMemoryKindFilter('all')">全部</button>
      <button class="mem-tab" data-kind="daily" onclick="setMemoryKindFilter('daily')">日常</button>
      <button class="mem-tab" data-kind="long_term" onclick="setMemoryKindFilter('long_term')">长期重要</button>
    </div>
    <div class="mem-count" id="memCount"></div>
    <div class="mem-list" id="memList"><div class="mem-empty">暂无记忆</div></div>
    <div class="mem-add-row">
      <input type="text" id="memAddInput" placeholder="手动添加一条记忆...">
      <select id="memAddType">
        <option value="shared_moment">共同经历</option>
        <option value="emotion">情感时刻</option>
        <option value="life_event">重要事件</option>
        <option value="preference">喜好/雷区</option>
        <option value="promise">约定承诺</option>
        <option value="milestone">关系里程碑</option>
      </select>
      <button onclick="addMemory()">添加</button>
    </div>
    <div class="anchor-row">
      <span class="anchor-label">📌 总结锚点：<span id="anchorDate">--</span></span>
      <input type="date" id="anchorDateInput" class="anchor-input">
      <button class="anchor-reset-btn" onclick="resetAnchor()">回退</button>
    </div>
    <div class="digest-status" id="digestStatus" style="display:none"></div>
    <div class="btn-row memory-actions-row">
      <button class="btn-digest" id="compressDailyBtn" onclick="compressDailyMemories()" style="background:#6a4c93">🗜️ 生成压缩草稿</button>
      <button class="btn-digest" id="digestBtn" onclick="triggerDigest()">📝 总结新记忆</button>
      <button class="btn-digest" id="rebuildBtn" onclick="rebuildEmbeddings()" style="background:#1565c0">🔄 重建向量索引</button>
    </div>
    <div class="compress-review" id="compressReview" style="display:none"></div>
  </div>
</div>

<!-- 原文查看弹窗 -->
<div class="source-overlay" id="sourceOverlay" onclick="if(event.target===this)closeSource()">
  <div class="source-modal">
    <h3>📜 原文记录</h3>
    <div class="source-summary" id="sourceSummary"></div>
    <div class="source-toolbar">
      <button onclick="setSourceSelection('recommended')">恢复预选</button>
      <button onclick="setSourceSelection('all')">全选</button>
      <button onclick="setSourceSelection('none')">全不选</button>
      <button class="source-save" id="sourceSaveBtn" onclick="saveSourceSelection()">保存筛选</button>
    </div>
    <div id="sourceList" style="max-height:60vh;overflow-y:auto"><div class="mem-empty">加载中...</div></div>
    <div class="btn-row"><button class="btn-cancel" onclick="closeSource()">关闭</button></div>
  </div>
</div>

<script src="/static/theme.js?v=theme-20260606"></script>
<script src="/static/common.js"></script>
<script>
const MEM_TYPE_LABELS = {
  shared_moment:"共同经历", emotion:"情感时刻", life_event:"重要事件",
  preference:"喜好/雷区", promise:"约定承诺", milestone:"关系里程碑",
  event:"事件", digest:"日常总结", seeky_digest:"日常整理",
  seeky_compressed:"日常压缩", daily:"日常", important:"长期重要"
};
const SUMMARY_MEMORY_TYPES = new Set(["digest", "seeky_digest", "seeky_compressed", "daily"]);
let _allMemories = [];
let _sourceMemId = null;
let _sourceMessages = [];
let _dailyCompressReview = null;
let _memoryKindFilter = "all";

function memoryKind(m) {
  return m.memory_kind || (SUMMARY_MEMORY_TYPES.has(String(m.type || '').toLowerCase()) ? 'daily' : 'long_term');
}
function memoryKindLabel(m) {
  return m.memory_kind_label || (memoryKind(m) === 'daily' ? '日常' : '长期重要');
}
function fmtMemoryOccurrence(m) {
  if (m.memory_time_label) return m.memory_time_label;
  const start = Number(m.source_start_ts || 0);
  const end = Number(m.source_end_ts || 0);
  const created = Number(m.created_at || 0);
  const fmt = ts => new Date(ts * 1000).toLocaleString("zh-CN", {year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
  if (start > 0) {
    if (end > 0 && Math.abs(end - start) >= 60) {
      const sameDay = new Date(start * 1000).toDateString() === new Date(end * 1000).toDateString();
      const endText = sameDay
        ? new Date(end * 1000).toLocaleTimeString("zh-CN", {hour:"2-digit",minute:"2-digit"})
        : fmt(end);
      return `发生：${fmt(start)}-${endText}`;
    }
    return `发生：${fmt(start)}`;
  }
  return created > 0 ? `记录：${fmt(created)}` : "";
}
function typeForMemoryKind(currentType, selectedKind) {
  const current = String(currentType || '').toLowerCase();
  const isDaily = SUMMARY_MEMORY_TYPES.has(current);
  if (selectedKind === 'daily') return isDaily ? (currentType || 'daily') : 'daily';
  return isDaily ? 'important' : (currentType || 'important');
}

connectCommonWS(msg => {
  if (msg.type === "memory_added") {
    _allMemories.unshift(msg.data);
    renderMemories();
  }
});

(async function init() {
  await loadMemories();
  loadAnchor();
  loadCompressionDraft();
})();

async function loadMemories() {
  try {
    _allMemories = await api("GET", "/api/memories");
    renderMemories();
  } catch(e) {
    $("memList").innerHTML = '<div class="mem-empty">加载失败</div>';
  }
}

function filterMemories() { renderMemories(); }

function setMemoryKindFilter(kind) {
  _memoryKindFilter = kind || "all";
  document.querySelectorAll(".mem-tab").forEach(btn => {
    const active = btn.dataset.kind === _memoryKindFilter;
    btn.classList.toggle("active", active);
    btn.setAttribute("aria-selected", active ? "true" : "false");
  });
  renderMemories();
}

function renderMemories() {
  const query = ($("memSearch").value || "").toLowerCase();
  const kindFiltered = _memoryKindFilter === "all"
    ? _allMemories
    : _allMemories.filter(m => memoryKind(m) === _memoryKindFilter);
  const filtered = query
      ? kindFiltered.filter(m => (
        m.content.toLowerCase().includes(query) ||
        (MEM_TYPE_LABELS[m.type]||"").includes(query) ||
        memoryKindLabel(m).includes(query)
      ))
    : kindFiltered;
  const filterText = _memoryKindFilter === "daily" ? "日常" : (_memoryKindFilter === "long_term" ? "长期重要" : "");
  $("memCount").textContent = `共 ${_allMemories.length} 条记忆`
    + (filterText ? `，${filterText} ${kindFiltered.length} 条` : "")
    + ((query || filterText) ? `，当前显示 ${filtered.length} 条` : "");
  const el = $("memList");
  if (!filtered.length) { el.innerHTML = '<div class="mem-empty">暂无记忆</div>'; return; }
  el.innerHTML = filtered.map(m => {
    const typeLabel = MEM_TYPE_LABELS[m.type] || m.type;
    const kindLabel = memoryKindLabel(m);
    const kindClass = memoryKind(m) === 'daily' ? 'kind-daily' : 'kind-long-term';
    const timeStr = fmtMemoryOccurrence(m);
    const hasSource = Number(m.source_count || 0) > 0;
    const sourceBtn = hasSource ? `<button class="mem-source-btn" onclick="viewSource('${escHtml(m.id)}')" title="查看原文">📜</button>` : '';
    let kwDisplay = '';
    try {
      const kws = m.keywords ? (typeof m.keywords === 'string' ? JSON.parse(m.keywords) : m.keywords) : [];
      if (kws.length) kwDisplay = `<span class="mem-kw">${kws.map(k => escHtml(k)).join(' · ')}</span>`;
    } catch(e) { if (m.keywords) kwDisplay = `<span class="mem-kw">${escHtml(m.keywords)}</span>`; }
    const impDisplay = m.importance != null ? `<span class="mem-imp" title="重要度">${Number(m.importance).toFixed(1)}</span>` : '';
    const pinClass = m.unresolved ? 'mem-pin active' : 'mem-pin';
    return `<div class="mem-entry${m.unresolved ? ' mem-unresolved' : ''}" data-id="${escHtml(m.id)}">
      <div class="mem-left"><span class="mem-type ${kindClass}" title="${escHtml(typeLabel)}">${escHtml(kindLabel)}</span>${impDisplay}</div>
      <div style="flex:1;min-width:0">
        <div class="mem-content" id="mc_${escHtml(m.id)}">${escHtml(m.content)}</div>
        <div class="mem-meta">${kwDisplay}${timeStr ? `<span class="mem-time">${escHtml(timeStr)}</span>` : ''}</div>
      </div>
      <div class="mem-actions">
        <button class="${pinClass}" onclick="toggleUnresolved('${escHtml(m.id)}')" title="标记待办">📌</button>
        ${sourceBtn}
        <button onclick="editMemory('${escHtml(m.id)}')" title="编辑">✏️</button>
        <button onclick="deleteMemory('${escHtml(m.id)}')" title="删除">🗑️</button>
      </div>
    </div>`;
  }).join("");
}

function restoreMemoryPosition(id) {
  requestAnimationFrame(() => {
    const list = $("memList");
    const entry = list ? Array.from(list.querySelectorAll(".mem-entry")).find(el => el.dataset.id === id) : null;
    if (!list || !entry) return;
    const targetTop = Math.max(0, entry.offsetTop - Math.max(0, (list.clientHeight - entry.clientHeight) / 2));
    list.scrollTo({ top: targetTop, behavior: "auto" });
    entry.classList.add("mem-return-focus");
    setTimeout(() => entry.classList.remove("mem-return-focus"), 1200);
  });
}

function editMemory(id) {
  const mem = _allMemories.find(m => m.id === id);
  if (!mem) return;
  const entry = document.querySelector(`.mem-entry[data-id="${id}"]`);
  if (!entry) return;
  let kws = '';
  try { const arr = mem.keywords ? (typeof mem.keywords === 'string' ? JSON.parse(mem.keywords) : mem.keywords) : []; kws = arr.join(', '); } catch(e) { kws = mem.keywords || ''; }
  const imp = mem.importance != null ? Number(mem.importance).toFixed(1) : '0.5';
  // 进入聚焦编辑模式
  document.querySelector('.sub-page').classList.add('editing-focus');
  entry.classList.add('mem-editing');
  const curType = mem.type || 'event';
  const curKind = memoryKind(mem);
  entry.innerHTML = `
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;padding:4px 0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--text2);font-weight:600">✏️ 编辑记忆</span>
        <button onclick="cancelEdit()" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 4px">✕</button>
      </div>
      <textarea class="mem-content-edit" id="me_${escHtml(id)}">${escHtml(mem.content)}</textarea>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <label style="font-size:11px;color:var(--text2)">记忆标签:</label>
        <select id="mg_${escHtml(id)}" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;outline:none">
          <option value="long_term"${curKind === 'long_term' ? ' selected' : ''}>长期重要</option>
          <option value="daily"${curKind === 'daily' ? ' selected' : ''}>日常</option>
        </select>
        <label style="font-size:11px;color:var(--text2)">关键词:</label>
        <input type="text" id="mk_${escHtml(id)}" value="${escHtml(kws)}" placeholder="逗号分隔" style="flex:1;min-width:120px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;outline:none">
        <label style="font-size:11px;color:var(--text2)">重要度:</label>
        <input type="number" id="mi_${escHtml(id)}" value="${imp}" min="0" max="1" step="0.1" style="width:50px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;outline:none">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button onclick="cancelEdit()" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:4px;padding:6px 16px;cursor:pointer;font-size:13px">取消</button>
        <button onclick="saveMemoryEdit('${escHtml(id)}')" style="background:var(--accent);color:#fff;border:none;border-radius:4px;padding:6px 16px;cursor:pointer;font-size:13px;font-weight:600">保存</button>
      </div>
    </div>`;
  document.getElementById("me_" + id).focus();
}

function cancelEdit() {
  document.querySelector('.sub-page').classList.remove('editing-focus');
  const editingEntry = document.querySelector('.mem-editing');
  if (editingEntry) editingEntry.classList.remove('mem-editing');
  renderMemories();
}

async function saveMemoryEdit(id) {
  const el = document.getElementById("me_" + id);
  if (!el) return;
  const newContent = el.value.trim();
  if (!newContent) return;
  const kwEl = document.getElementById("mk_" + id);
  const impEl = document.getElementById("mi_" + id);
  const kindEl = document.getElementById("mg_" + id);
  const kwStr = kwEl ? kwEl.value.trim() : '';
  const kwArr = kwStr ? kwStr.split(/[,，]/).map(s => s.trim()).filter(Boolean) : [];
  const imp = impEl ? parseFloat(impEl.value) : null;
  const mem = _allMemories.find(m => m.id === id);
  const selectedKind = kindEl ? kindEl.value : memoryKind(mem || {});
  const newType = typeForMemoryKind(mem?.type, selectedKind);
  const body = { content: newContent, keywords: JSON.stringify(kwArr) };
  if (newType) body.type = newType;
  if (imp != null && !isNaN(imp)) body.importance = Math.max(0, Math.min(1, imp));
  try {
    await api("PUT", `/api/memories/${id}`, body);
    if (mem) {
      mem.content = newContent;
      mem.keywords = body.keywords;
      if (newType) mem.type = newType;
      mem.memory_kind = selectedKind;
      mem.memory_kind_label = selectedKind === 'daily' ? '日常' : '长期重要';
      if (body.importance != null) mem.importance = body.importance;
    }
    document.querySelector('.sub-page').classList.remove('editing-focus');
    renderMemories();
    restoreMemoryPosition(id);
  } catch(e) { alert("保存失败"); }
}

async function deleteMemory(id) {
  if (!confirm("确定删除这条记忆？")) return;
  try {
    await api("DELETE", `/api/memories/${id}`);
    _allMemories = _allMemories.filter(m => m.id !== id);
    renderMemories();
  } catch(e) { alert("删除失败"); }
}

async function toggleUnresolved(id) {
  try {
    const result = await api("PATCH", `/api/memories/${id}/unresolved`);
    const mem = _allMemories.find(m => m.id === id);
    if (mem) mem.unresolved = result.unresolved;
    renderMemories();
  } catch(e) { alert("切换失败"); }
}

async function addMemory() {
  const content = $("memAddInput").value.trim();
  if (!content) return;
  const type = $("memAddType").value;
  try {
    const mem = await api("POST", "/api/memories", { content, type });
    _allMemories.unshift(mem);
    $("memAddInput").value = "";
    renderMemories();
  } catch(e) { alert("添加失败"); }
}

async function triggerDigest() {
  const btn = $("digestBtn");
  const statusEl = $("digestStatus");
  btn.disabled = true;
  btn.textContent = "⏳ 正在总结...";
  statusEl.style.display = "block";
  statusEl.className = "digest-status info";
  statusEl.textContent = "正在分析新消息并生成记忆摘要，请稍候...";
  try {
    const result = await api("POST", "/api/memories/digest");
    if (result.new_memories_count > 0) {
      statusEl.className = "digest-status success";
      statusEl.textContent = result.message;
      await loadMemories();
    } else {
      statusEl.className = "digest-status info";
      statusEl.textContent = result.message;
    }
    loadAnchor();
  } catch(e) {
    statusEl.className = "digest-status error";
    statusEl.textContent = "总结失败：" + (e.message || "未知错误");
  } finally {
    btn.disabled = false;
    btn.textContent = "📝 总结新记忆";
    setTimeout(() => { statusEl.style.display = "none"; }, 5000);
  }
}

async function compressDailyMemories() {
  const btn = $("compressDailyBtn");
  const statusEl = $("digestStatus");
  if (_dailyCompressReview && _dailyCompressReview.status === 'draft') {
    renderDailyCompressionReview();
    statusEl.style.display = "block";
    statusEl.className = "digest-status info";
    statusEl.textContent = "已经有一份压缩草稿，先确认应用或废弃它。";
    return;
  }
  if (!confirm("将按 15-90 天、90-180 天、180-365 天、365 天以上分阶段生成压缩草稿；这一步不会修改记忆库。继续？")) return;
  btn.disabled = true;
  btn.textContent = "生成中...";
  statusEl.style.display = "block";
  statusEl.className = "digest-status info";
  statusEl.textContent = "正在让当前主模型整理主记忆库的旧日常记忆草稿，请稍候...";
  try {
    const result = await api("POST", "/api/memories/compress-daily", { target: "main", days: 15 });
    _dailyCompressReview = result.review || null;
    renderDailyCompressionReview();
    const counts = _dailyCompressReview?.counts || {};
    const errors = (counts.total?.errors || []).filter(Boolean);
    statusEl.className = errors.length ? "digest-status error" : "digest-status success";
    statusEl.textContent = result.message || "压缩草稿已生成";
  } catch(e) {
    statusEl.className = "digest-status error";
    statusEl.textContent = "生成压缩草稿失败：" + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "🗜️ 生成压缩草稿";
  }
}

async function loadCompressionDraft() {
  try {
    const result = await api("GET", "/api/memories/compress-daily/latest?target=main");
    _dailyCompressReview = result.review || null;
    renderDailyCompressionReview();
  } catch(e) {
    _dailyCompressReview = null;
  }
}

function flattenDraftBatches(key, field) {
  return ((_dailyCompressReview?.payload?.[key]?.batches) || []).flatMap(batch => batch[field] || []);
}

function oldRowsForDraft(key) {
  return ((_dailyCompressReview?.counts?.[key]?.old_rows) || []);
}

function fmtDraftTime(ts) {
  if (!ts) return "";
  const d = new Date(Number(ts) * 1000);
  if (Number.isNaN(d.getTime())) return "";
  return d.toLocaleString("zh-CN", {month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function draftBatches(key) {
  return (_dailyCompressReview?.payload?.[key]?.batches) || [];
}

function draftCoveredSet(batch) {
  const ids = new Set(batch.covered_ids || []);
  (batch.discard_memory_ids || []).forEach(id => ids.add(id));
  ["compressed_daily", "important_memories"].forEach(field => {
    (batch[field] || []).forEach(item => (item.source_memory_ids || []).forEach(id => ids.add(id)));
  });
  return ids;
}

function refreshDraftBatch(batch) {
  const oldIds = new Set((batch.old_rows || []).map(row => row.id).filter(Boolean));
  const covered = Array.from(draftCoveredSet(batch)).filter(id => !oldIds.size || oldIds.has(id));
  batch.covered_ids = covered;
  batch.remaining = Math.max(0, Number(batch.input_count || 0) - covered.length);
}

function refreshDraftPayload() {
  ["main", "chatroom"].forEach(key => draftBatches(key).forEach(refreshDraftBatch));
}

function setDraftItemValue(area, batchIndex, field, itemIndex, prop, value) {
  const item = draftBatches(area)?.[batchIndex]?.[field]?.[itemIndex];
  if (!item) return;
  if (prop === "keywords") item[prop] = parseKeywordText(value);
  else if (prop === "importance" || prop === "compression_stage") item[prop] = Number(value || 0);
  else item[prop] = value;
}

function removeDraftItem(area, batchIndex, field, itemIndex) {
  const items = draftBatches(area)?.[batchIndex]?.[field];
  if (!items) return;
  items.splice(itemIndex, 1);
  refreshDraftPayload();
  renderDailyCompressionReview();
}

function addDraftItem(area, field) {
  const batches = draftBatches(area);
  if (!batches.length) return;
  const batch = batches[0];
  const now = Math.floor(Date.now() / 1000);
  const item = {
    content: "",
    source_memory_ids: [],
    source_msg_ids: [],
    keywords: [],
    importance: field === "important_memories" ? 0.8 : 0.25,
    memory_time: batch.old_rows?.[0]?.source_start_ts || batch.old_rows?.[0]?.created_at || now,
    source_start_ts: batch.old_rows?.[0]?.source_start_ts || batch.old_rows?.[0]?.created_at || now,
    source_end_ts: batch.old_rows?.[0]?.source_end_ts || batch.old_rows?.[0]?.created_at || now,
    memory_kind: field === "important_memories" ? "long_term" : "daily",
    memory_type: field === "important_memories" ? "important" : "daily",
    compression_stage: field === "important_memories" ? 0 : Number(batch.output_stage || 1),
    retain_source_detail: batch.retain_source_detail ?? (Number(batch.output_stage || 1) < 3),
    reason: "用户手动添加"
  };
  batch[field] = batch[field] || [];
  batch[field].push(item);
  renderDailyCompressionReview();
}

function setOldRowCovered(area, batchIndex, memId, covered) {
  const batch = draftBatches(area)?.[batchIndex];
  if (!batch || !memId) return;
  batch.discard_memory_ids = (batch.discard_memory_ids || []).filter(id => id !== memId);
  batch.covered_ids = (batch.covered_ids || []).filter(id => id !== memId);
  if (covered) {
    batch.discard_memory_ids.push(memId);
  } else {
    ["compressed_daily", "important_memories"].forEach(field => {
      (batch[field] || []).forEach(item => {
        item.source_memory_ids = (item.source_memory_ids || []).filter(id => id !== memId);
      });
    });
  }
  refreshDraftBatch(batch);
  renderDailyCompressionReview();
}

async function saveDailyCompressionDraft(silent = false) {
  if (!_dailyCompressReview?.id) return null;
  refreshDraftPayload();
  const result = await api("PATCH", `/api/memories/compress-daily/${_dailyCompressReview.id}`, {
    payload: _dailyCompressReview.payload
  });
  if (!result.ok) throw new Error(result.message || "保存草稿失败");
  _dailyCompressReview = result.review || _dailyCompressReview;
  renderDailyCompressionReview();
  if (!silent) {
    const statusEl = $("digestStatus");
    statusEl.style.display = "block";
    statusEl.className = "digest-status success";
    statusEl.textContent = result.message || "草稿已保存";
  }
  return result;
}

function renderCompressItem(item, kindLabel, area, batchIndex, field, itemIndex) {
  const kws = Array.isArray(item.keywords) ? item.keywords : parseKeywordText(item.keywords);
  const sourceCount = (item.source_memory_ids || []).length;
  return `<div class="compress-item">
    <div class="compress-item-meta">
      <span>${escHtml(kindLabel)}</span>
      <span>stage ${Number(item.compression_stage || 0)}</span>
      <span>${escHtml(fmtDraftTime(item.memory_time || item.source_start_ts))}</span>
      <span>来源 ${sourceCount} 条日常</span>
      <span>重要度 ${Number(item.importance || 0).toFixed(2)}</span>
      ${kws.length ? `<span>${kws.map(k => escHtml(k)).join(" · ")}</span>` : ""}
    </div>
    <div class="compress-edit">
      <textarea oninput="setDraftItemValue('${area}',${batchIndex},'${field}',${itemIndex},'content',this.value)">${escHtml(item.content || "")}</textarea>
      <div class="compress-edit-row">
        <input value="${escHtml(kws.join(", "))}" placeholder="关键词" oninput="setDraftItemValue('${area}',${batchIndex},'${field}',${itemIndex},'keywords',this.value)">
        <input type="number" min="0" max="1" step="0.05" value="${Number(item.importance || 0).toFixed(2)}" oninput="setDraftItemValue('${area}',${batchIndex},'${field}',${itemIndex},'importance',this.value)">
        <input type="number" min="0" max="4" step="1" value="${Number(item.compression_stage || 0)}" oninput="setDraftItemValue('${area}',${batchIndex},'${field}',${itemIndex},'compression_stage',this.value)">
      </div>
      <input value="${escHtml(item.reason || "")}" placeholder="理由/证据摘要" oninput="setDraftItemValue('${area}',${batchIndex},'${field}',${itemIndex},'reason',this.value);setDraftItemValue('${area}',${batchIndex},'${field}',${itemIndex},'evidence_summary',this.value)">
      <div class="compress-mini-actions"><button onclick="removeDraftItem('${area}',${batchIndex},'${field}',${itemIndex})">删除这条</button></div>
    </div>
  </div>`;
}

function renderOldCompressItem(item, area, batchIndex, covered) {
  return `<div class="compress-item">
    <label class="compress-old-toggle">
      <input type="checkbox" ${covered ? "checked" : ""} onchange="setOldRowCovered('${area}',${batchIndex},'${escHtml(item.id)}',this.checked)">
      <div>
        <div>${escHtml(item.content || "")}</div>
        <div class="compress-item-meta">
          <span>${escHtml(fmtDraftTime(item.source_start_ts || item.created_at))}</span>
          <span>stage ${Number(item.compression_stage || 0)}</span>
          <span>重要度 ${Number(item.importance || 0).toFixed(2)}</span>
          <span>${covered ? "确认后压缩/移除旧条目" : "保留这条旧记忆"}</span>
        </div>
      </div>
    </label>
  </div>`;
}

function renderDraftItems(area, field, label) {
  return draftBatches(area).map((batch, batchIndex) => {
    const items = batch[field] || [];
    return items.map((item, itemIndex) => renderCompressItem(
      item,
      `${label} · ${batch.tier_label || batch.compression_tier || "stage"}`,
      area,
      batchIndex,
      field,
      itemIndex
    )).join("");
  }).join("");
}

function renderOldRowsForArea(area) {
  return draftBatches(area).map((batch, batchIndex) => {
    const covered = draftCoveredSet(batch);
    return (batch.old_rows || []).map(row => renderOldCompressItem(row, area, batchIndex, covered.has(row.id))).join("");
  }).join("");
}

function countDraftItems(area, field) {
  return draftBatches(area).reduce((sum, batch) => sum + ((batch[field] || []).length), 0);
}

function countOldRows(area) {
  return draftBatches(area).reduce((sum, batch) => sum + ((batch.old_rows || []).length), 0);
}

function draftCompressionWarnings() {
  const warnings = [];
  ["main", "chatroom"].forEach(area => {
    draftBatches(area).forEach(batch => {
      const input = Number(batch.input_count || 0);
      if (!input) return;
      const processed = draftCoveredSet(batch).size;
      const created = (batch.compressed_daily || []).length + (batch.important_memories || []).length;
      const ratio = processed / input;
      const label = batch.tier_label || batch.compression_tier || "未命名档位";
      if (batch.compression_tier === "recent" && ratio > 0.4) {
        warnings.push(`${label} 拟移除 ${processed}/${input} 条，近期记忆可能压得过狠。`);
      }
      if (batch.compression_tier === "recent" && input >= 5 && created === 0) {
        warnings.push(`${label} 没有生成新记忆，请确认不是误删近期内容。`);
      }
      if (batch.compression_tier === "archive" && (batch.compressed_daily || []).length > 1) {
        warnings.push(`${label} 生成了较多普通日常，事实档案层建议只保留重大事实。`);
      }
    });
  });
  return warnings;
}

function draftHasArea(area) {
  return draftBatches(area).length > 0;
}

function renderDraftAddButtons(area) {
  if (!draftHasArea(area)) return "";
  return `<div class="compress-mini-actions">
    <button onclick="addDraftItem('${area}','compressed_daily')">新增日常</button>
    <button onclick="addDraftItem('${area}','important_memories')">新增长期重要</button>
    </div>
  `;
}

function parseKeywordText(value) {
  if (!value) return [];
  if (Array.isArray(value)) return value;
  try {
    const parsed = JSON.parse(value);
    return Array.isArray(parsed) ? parsed : [];
  } catch(e) {
    return String(value).split(/[,，、\n]/).map(s => s.trim()).filter(Boolean);
  }
}

function renderDailyCompressionReview() {
  const el = $("compressReview");
  if (!_dailyCompressReview || !['draft', 'failed'].includes(_dailyCompressReview.status)) {
    el.style.display = "none";
    el.innerHTML = "";
    return;
  }
  const counts = _dailyCompressReview.counts || {};
  const total = counts.total || {};
  const dailyCount = countDraftItems("main", "compressed_daily") + countDraftItems("chatroom", "compressed_daily");
  const importantCount = countDraftItems("main", "important_memories") + countDraftItems("chatroom", "important_memories");
  const oldRowCount = countOldRows("main") + countOldRows("chatroom");
  const messages = [...(counts.main?.messages || []), ...(counts.chatroom?.messages || [])].filter(Boolean);
  const errors = total.errors || [];
  const warnings = draftCompressionWarnings();
  const canApply = _dailyCompressReview.status === 'draft' && (dailyCount || importantCount || Number(total.processed || 0));
  el.style.display = "block";
  el.innerHTML = `
    <div class="compress-review-head">
      <div class="compress-review-title">主记忆压缩草稿</div>
      <div class="compress-review-status">${escHtml(_dailyCompressReview.status === 'draft' ? '待确认' : '生成失败')}</div>
    </div>
    <div class="compress-review-stats">
      <span>候选 ${Number(_dailyCompressReview.candidate_count || 0)}</span>
      <span>拟移除 ${Number(total.processed || 0)}</span>
      <span>新日常 ${Number(total.created_daily || 0)}</span>
      <span>新长期重要 ${Number(total.created_important || 0)}</span>
    </div>
    ${messages.length ? `<div class="compress-review-msg">${escHtml(messages.join("\n"))}</div>` : ""}
    ${warnings.length ? `<div class="compress-review-msg" style="color:#ad6800">${escHtml(warnings.join("\n"))}</div>` : ""}
    ${errors.length ? `<div class="compress-review-msg" style="color:#c62828">${escHtml(errors.join("\n"))}</div>` : ""}
    ${renderDraftAddButtons("main")}
    <details open>
      <summary>新日常 ${dailyCount}</summary>
      ${dailyCount ? `${renderDraftItems("main", "compressed_daily", "主记忆 · 日常")}${renderDraftItems("chatroom", "compressed_daily", "聊天室 · 日常")}` : '<div class="mem-empty">没有新日常</div>'}
    </details>
    <details ${importantCount ? "open" : ""}>
      <summary>新长期重要 ${importantCount}</summary>
      ${importantCount ? `${renderDraftItems("main", "important_memories", "主记忆 · 长期重要")}${renderDraftItems("chatroom", "important_memories", "聊天室 · 长期重要")}` : '<div class="mem-empty">没有新长期重要</div>'}
    </details>
    <details>
      <summary>旧日常处理 ${oldRowCount}</summary>
      ${oldRowCount ? `${renderOldRowsForArea("main")}${renderOldRowsForArea("chatroom")}` : '<div class="mem-empty">没有旧日常会被处理</div>'}
    </details>
    <div class="compress-review-actions">
      <button class="compress-discard-btn" onclick="saveDailyCompressionDraft(false)">保存草稿</button>
      <button class="compress-discard-btn" onclick="discardDailyCompressionDraft('${escHtml(_dailyCompressReview.id)}')">废弃草稿</button>
      <button class="compress-apply-btn" onclick="applyDailyCompressionDraft('${escHtml(_dailyCompressReview.id)}')" ${canApply ? "" : "disabled"}>确认应用</button>
    </div>`;
}

function setCompressionReviewBusy(value) {
  document.querySelectorAll(".compress-review-actions button").forEach(btn => btn.disabled = value);
}

async function applyDailyCompressionDraft(reviewId) {
  if (!reviewId) return;
  const total = _dailyCompressReview?.counts?.total || {};
  if (!confirm(`确认应用这份压缩草稿？将移除旧日常 ${Number(total.processed || 0)} 条，并写入新日常 ${Number(total.created_daily || 0)} 条、新长期重要 ${Number(total.created_important || 0)} 条。`)) return;
  const statusEl = $("digestStatus");
  setCompressionReviewBusy(true);
  statusEl.style.display = "block";
  statusEl.className = "digest-status info";
  statusEl.textContent = "正在保存并应用压缩草稿...";
  try {
    await saveDailyCompressionDraft(true);
    const result = await api("POST", `/api/memories/compress-daily/${reviewId}/apply`);
    if (!result.ok) throw new Error(result.message || "应用失败");
    _dailyCompressReview = null;
    renderDailyCompressionReview();
    await loadMemories();
    statusEl.className = "digest-status success";
    statusEl.textContent = result.message || "压缩草稿已应用";
  } catch(e) {
    statusEl.className = "digest-status error";
    statusEl.textContent = "应用压缩草稿失败：" + (e.message || "未知错误");
    setCompressionReviewBusy(false);
  }
}

async function discardDailyCompressionDraft(reviewId) {
  if (!reviewId) return;
  if (!confirm("确定废弃这份压缩草稿？")) return;
  const statusEl = $("digestStatus");
  setCompressionReviewBusy(true);
  try {
    const result = await api("POST", `/api/memories/compress-daily/${reviewId}/discard`);
    if (!result.ok) throw new Error(result.message || "废弃失败");
    _dailyCompressReview = null;
    renderDailyCompressionReview();
    statusEl.style.display = "block";
    statusEl.className = "digest-status info";
    statusEl.textContent = result.message || "压缩草稿已废弃";
  } catch(e) {
    statusEl.style.display = "block";
    statusEl.className = "digest-status error";
    statusEl.textContent = "废弃压缩草稿失败：" + (e.message || "未知错误");
    setCompressionReviewBusy(false);
  }
}

async function rebuildEmbeddings() {
  const btn = $("rebuildBtn");
  const statusEl = $("digestStatus");
  if (!confirm("将用当前配置的向量模型为所有记忆重新生成向量索引，原有向量会被覆盖。确认继续？")) return;
  btn.disabled = true;
  btn.textContent = "⏳ 重建中...";
  statusEl.style.display = "block";
  statusEl.className = "digest-status info";
  statusEl.textContent = "正在重建向量索引，请稍候...";
  try {
    const result = await api("POST", "/api/memories/rebuild-embeddings");
    statusEl.className = "digest-status success";
    statusEl.textContent = `向量索引重建完成：${result.success}/${result.total} 条成功` + (result.failed > 0 ? `，${result.failed} 条失败` : "");
  } catch(e) {
    statusEl.className = "digest-status error";
    statusEl.textContent = "重建失败：" + (e.message || "未知错误");
  } finally {
    btn.disabled = false;
    btn.textContent = "🔄 重建向量索引";
    setTimeout(() => { statusEl.style.display = "none"; }, 8000);
  }
}

async function viewSource(memId) {
  _sourceMemId = memId;
  _sourceMessages = [];
  $("sourceOverlay").classList.add("show");
  const listEl = $("sourceList");
  $("sourceSummary").textContent = "";
  listEl.innerHTML = '<div class="mem-empty">加载中...</div>';
  try {
    const result = await api("GET", `/api/memories/${memId}/source`);
    if (!result.ok || !result.messages || !result.messages.length) {
      listEl.innerHTML = '<div class="mem-empty">' + (result.message || "没有找到原文记录") + '</div>';
      return;
    }
    _sourceMessages = result.messages.map(m => ({ ...m, selected: !!m.selected, recommended: !!m.recommended }));
    renderSourceSelection();
  } catch(e) { listEl.innerHTML = '<div class="mem-empty">加载失败</div>'; }
}

function renderSourceSelection() {
  const listEl = $("sourceList");
  if (!_sourceMessages.length) {
    listEl.innerHTML = '<div class="mem-empty">没有找到原文记录</div>';
    return;
  }
  listEl.innerHTML = _sourceMessages.map((m, idx) => {
    const timeStr = m.created_at ? new Date(m.created_at * 1000).toLocaleString("zh-CN", {month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "";
    const srcTag = m.source === "chatroom" ? '<span style="color:#f0a040;font-size:11px;margin-left:6px;">[群聊]</span>' : "";
    const checked = m.selected ? "checked" : "";
    const offClass = m.selected ? "" : " source-off";
    return `<div class="source-msg${offClass}">
      <div class="source-head">
        <input class="source-check" type="checkbox" ${checked} onchange="toggleSourceMsg(${idx}, this.checked)">
        <div class="source-main">
          <span class="source-name">${escHtml(m.name)}</span>${srcTag}<span class="source-time">${escHtml(timeStr)}</span>
          <div style="margin-top:4px;white-space:pre-wrap;word-break:break-word;">${escHtml(m.content)}</div>
        </div>
      </div>
    </div>`;
  }).join("");
  updateSourceSummary();
}

function updateSourceSummary() {
  const total = _sourceMessages.length;
  const kept = _sourceMessages.filter(m => m.selected).length;
  $("sourceSummary").textContent = `将保留 ${kept}/${total} 条原文挂载到这条记忆；点击保存前不会写入数据库。`;
}

function toggleSourceMsg(index, checked) {
  if (!_sourceMessages[index]) return;
  _sourceMessages[index].selected = checked;
  renderSourceSelection();
}

function setSourceSelection(mode) {
  if (mode === "all") _sourceMessages.forEach(m => m.selected = true);
  else if (mode === "none") _sourceMessages.forEach(m => m.selected = false);
  else _sourceMessages.forEach(m => m.selected = !!m.recommended);
  renderSourceSelection();
}

async function saveSourceSelection() {
  if (!_sourceMemId) return;
  const selectedIds = _sourceMessages.filter(m => m.selected).map(m => m.id);
  if (!selectedIds.length && !confirm("你没有保留任何原文。保存后这条记忆将不再追溯原文，确定继续吗？")) return;
  const btn = $("sourceSaveBtn");
  btn.disabled = true;
  btn.textContent = "保存中...";
  try {
    const result = await api("POST", `/api/memories/${_sourceMemId}/source-selection`, { source_message_ids: selectedIds });
    if (!result.ok) throw new Error(result.message || "保存失败");
    const mem = _allMemories.find(m => m.id === _sourceMemId);
    if (mem) {
      mem.source_msg_id = result.source_msg_id;
      mem.source_start_ts = result.source_start_ts;
      mem.source_end_ts = result.source_end_ts;
      mem.source_count = result.selected_count || 0;
      mem.memory_time = result.memory_time;
      mem.memory_time_end = result.memory_time_end;
      mem.memory_time_label = result.memory_time_label || fmtMemoryOccurrence(mem);
    }
    renderMemories();
    closeSource();
  } catch(e) {
    alert("保存失败：" + (e.message || "未知错误"));
  } finally {
    btn.disabled = false;
    btn.textContent = "保存筛选";
  }
}

function closeSource() {
  $("sourceOverlay").classList.remove("show");
  _sourceMemId = null;
  _sourceMessages = [];
}

async function loadAnchor() {
  try {
    const res = await api("GET", "/api/memories/digest/anchor");
    $("anchorDate").textContent = res.anchor_date || "--";
  } catch(e) { $("anchorDate").textContent = "加载失败"; }
}

async function resetAnchor() {
  const dateVal = $("anchorDateInput").value;
  if (!dateVal) { alert("请先选择要回退到的日期"); return; }
  if (!confirm(`确定将总结锚点回退到 ${dateVal}？`)) return;
  try {
    const res = await api("POST", "/api/memories/digest/anchor", { date: dateVal });
    if (res.ok) {
      $("anchorDate").textContent = res.anchor_date;
      $("anchorDateInput").value = "";
      showToast("✅ 锚点已回退到 " + res.anchor_date);
    } else { alert(res.message || "回退失败"); }
  } catch(e) { alert("回退失败"); }
}
</script>
</body>
